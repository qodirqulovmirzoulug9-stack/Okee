name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'
      
      # iOS papkasini noldan to'g'ri yaratish
      - run: flutter create . --platforms=ios --project-name=okee
      
      - run: flutter pub get
      
      # IPA faylini yig'ish (build)
      - name: Build IPA
        run: flutter build ipa --no-codesign --release
        
      # Tayyor faylni GitHub-ga yuklash (Artifacts bo'limiga)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Okee-App-IPA
          path: build/ios/ipa/*.ipa  # Fayl aynan shu yerda bo'ladi
