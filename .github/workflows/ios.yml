name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'
      
      # iOS platformasini noldan sozlash
      - run: flutter create . --platforms=ios --project-name=okee
      
      - run: flutter pub get
      
      # IPA yig'ish (bu bosqich kamida 5-10 daqiqa olishi kerak)
      - name: Build IPA
        run: flutter build ipa --no-codesign --release

      # MUHIM: Faylni topish uchun butun build papkasini ko'rsatamiz
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Okee-App-IPA
          path: build/ios/ipa/*.ipa
          if-no-files-found: error # Agar fayl topilmasa, xato bersin (shunda sababini ko'ramiz)
